display_information:
  name: mycrew
  description: AI assistant — Claude Code in Slack
features:
  bot_user:
    display_name: mycrew
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
  slash_commands:
    - command: /commands
      description: Show all available bot commands
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - chat:write.public
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - reactions:read
      - reactions:write
      - canvases:read
      - canvases:write
      - reminders:read
      - reminders:write
      - lists:read
      - lists:write
      - files:read
      - files:write
      - links:read
      - pins:read
      - pins:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - member_joined_channel
      - channel_created
      - app_home_opened
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
